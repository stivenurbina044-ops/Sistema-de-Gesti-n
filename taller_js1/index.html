<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" ></script>
</head>
<body>
    <div class="container">
        <h1>Tiendas JSON🛒</h1>

        <h2>Productos Disponibles</h2>
        <div id="productosLista" class="productos-grid"></div>

        <h2>Carrito de Compras</h2>
        <div id="carritoLista" class="carrito-items"></div>

        <div class="totales">
            <p>Total de productos: <span id="totalCantidad">0</span></p>
            <p>Total a pagar: $<span id="totalPrecio">0.00</span></p>
        </div>

        <button id="limpiarCarrito">Limpiar Carrito</button>
    </div>
</body>
</html>
